<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
#header { padding: 16px; text-align: center; border-bottom: 1px solid #222; }
#header h1 { font-size: 20px; letter-spacing: 4px; color: #a78bfa; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; }
.user { background: #1e1b4b; align-self: flex-end; }
.assistant { background: #1a1a1a; border: 1px solid #333; align-self: flex-start; }
.error { background: #3b0000; border: 1px solid #ff0000; align-self: flex-start; }
#input-area { padding: 16px; border-top: 1px solid #222; display: flex; gap: 8px; }
#input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; }
#send { background: #7c3aed; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
</style>
</head>
<body>
<div id="header"><h1>⬡ AXIOM</h1></div>
<div id="messages"></div>
<div id="input-area">
<input id="input" placeholder="با AXIOM صحبت کن..." />
<button id="send">↑</button>
</div>
<script>
const API_KEY = "اینجا API key کلودت رو بذار";
const messages = [];

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  
  addMessage(text, "user");
  messages.push({ role: "user", content: text });
  input.value = "";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": 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
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1024,
        messages: messages
      })
    });

    const data = await res.json();
    
    if (data.error) {
      addMessage("خطا: " + JSON.stringify(data.error), "error");
    } else {
      const reply = data.content[0].text;
      messages.push({ role: "assistant", content: reply });
      addMessage(reply, "assistant");
    }
  } catch(e) {
    addMessage("خطا: " + e.message, "error");
  }
}

function addMessage(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();
}

document.getElementById("send").onclick = send;
document.getElementById("input").onkeydown = e => e.key === "Enter" && send();
</script>
</body>
</html>
