<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM</title>
<style>
  body {
    background: #0a0a0f;
    color: #00ffcc;
    font-family: Tahoma, sans-serif;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    letter-spacing: 4px;
  }
  #chatBox {
    background: #111118;
    border: 1px solid #00ffcc44;
    border-radius: 10px;
    height: 60vh;
    overflow-y: auto;
    padding: 15px;
    margin-bottom: 15px;
  }
  .msg { margin: 10px 0; line-height: 1.6; }
  .user { color: #ffffff; }
  .bot { color: #00ffcc; }
  #inputArea {
    display: flex;
    gap: 8px;
  }
  #userInput {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #00ffcc44;
    background: #111118;
    color: white;
    font-size: 16px;
  }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #00ffcc;
    color: #0a0a0f;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>⬡ AXIOM</h1>
<div id="chatBox"></div>
<div id="inputArea">
  <input type="text" id="userInput" placeholder="پیامت رو بنویس..." />
  <button onclick="sendMessage()">ارسال</button>
</div>

<script>
const SERVER_URL = "https://://axiom-production-5f63.up.railway.app/api/chat";

async function sendMessage() {
  const input = document.getElementById('userInput');
  const chatBox = document.getElementById('chatBox');
  const message = input.value.trim();
  if (!message) return;

  chatBox.innerHTML += `<div class="msg user">داش علی: ${message}</div>`;
  input.value = '';
  chatBox.scrollTop = chatBox.scrollHeight;

  chatBox.innerHTML += `<div class="msg bot" id="loading">AXIOM: در حال فکر کردن...</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const response = await fetch(SERVER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await response.json();
    document.getElementById('loading').remove();
    chatBox.innerHTML += `<div class="msg bot">AXIOM: ${data.reply || data.error || JSON.stringify(data)}</div>`;
  } catch (err) {
    document.getElementById('loading').remove();
    chatBox.innerHTML += `<div class="msg bot">AXIOM: خطای شبکه: ${err.message}</div>`;
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

document.getElementById('userInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
